<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pikachu</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
  <div id="container">


    <div id="left">

      <div id="icon">
        <img src="/images/Pokemon.png" alt="">
      </div>

      <div id="small">
        <h3>POKEMON GEN I</h3>
      </div>

      <div id="large">
        <h1>Pikachu</h1>
      </div>

      <div id="context">
        Pikachu is an Electric-type Pokémon introduced 
        in Generation I. Pikachu are small, chubby, <br>
        and incredibly cute mouse-like Pokémon. <br>
        They are almost completely covered by <br>
        yellow fur.
      </div>

      <div id="category">
        <h4>&horbar; 01/08</h4>
      </div>

      <div id="ball">
        <img src="/images/Pokemon Ball.png" alt="Pokemon Ball">
      </div>

    </div>



    <div id="right">

      <div id="menu">
        <i class="ri-menu-line"></i>
      </div>

      <div id="pikachu">
        <img src="/images/pikachu.png" alt="Pikachu">
      </div>

      <div id="dots">
        <div class="dot Bold"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

    </div>
  </div>
</body>
</html>
